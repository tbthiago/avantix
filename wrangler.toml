name = "avantix"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

# ─── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "avantix-db"
database_id   = "0fbcba00-bb7a-4b0c-a5af-b1fea0ffa27c"

# ─── R2 Bucket ────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "avantix-fichas"

# ─── Environment variables (optional) ─────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
SMTP_HOST = "smtp.umbler.com"
SMTP_PORT = "587"
SMTP_USER = "contato@avantixlabor.com.br"
SMTP_FROM = "contato@avantixlabor.com.br"
SMTP_FROM_NAME = "Avantix Laboratorio"
NOTIFY_EMAIL = "contato@avantixlabor.com.br"

# ─── Preview / Development overrides ──────────────────────────────────────────
[env.preview]
[env.preview.vars]
ENVIRONMENT = "preview"
