<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo — Avantix Lab</title>
  <link rel="stylesheet" href="css/styles.css?v=20260526-files1">
</head>
<body>
<main class="app-shell">
  <aside class="app-sidebar">
    <a href="index.html" class="nav__logo">
      <svg class="nav__logo-mark" viewBox="0 0 36 36" fill="none">
        <polygon points="18,4 24,18 20,18 15,26 11,26" fill="#A01848"/>
        <polygon points="18,4 22,18 26,28 30,28" fill="#3A5A8C"/>
        <polygon points="15,26 20,18 24,18 27,26" fill="#1E6B4A"/>
      </svg>
      <span class="nav__logo-text">AVANTIX</span>
    </a>
    <nav class="app-menu">
      <a class="active" href="admin.html">Dashboard</a>
      <a href="portal.html" data-logout>Sair</a>
    </nav>
  </aside>

  <section class="app-content">
    <header class="app-header">
      <div>
        <span class="subtitle">Laboratório</span>
        <h1 class="display-md">Dashboard administrativo</h1>
        <p>Todos os pedidos de todos os clientes em um único painel.</p>
      </div>
    </header>

    <div class="metrics-grid" id="admin-metrics"></div>

    <div class="admin-toolbar">
      <input id="admin-search" type="search" placeholder="Buscar cliente, paciente, serviço ou email">
      <select id="admin-status">
        <option value="">Todos os status</option>
      </select>
      <button class="btn btn--ghost" id="admin-refresh" type="button">Atualizar</button>
    </div>

    <div class="work-panel">
      <div class="panel-heading">
        <h2>Pedidos de todos os clientes</h2>
      </div>
      <div class="table-wrap">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Paciente</th>
              <th>Serviço</th>
              <th>Prazo</th>
              <th>Arquivos</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="admin-orders-body"></tbody>
        </table>
      </div>
      <div class="empty-state" id="admin-empty">Nenhum pedido encontrado.</div>
    </div>
  </section>
</main>
<script src="js/portal.js?v=20260526-files1"></script>
<script>loadAdminPanel();</script>
</body>
</html>
